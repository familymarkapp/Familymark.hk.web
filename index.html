<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FamilyMark">
<meta name="theme-color" content="#0C2A1A">
<title>FamilyMark.hk — 香港家庭存貨管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F8F6F1; --surface:#FFFFFF; --surface2:#F0EBE2;
  --header:#0C2A1A; --ink:#1A1814; --ink2:#5A5248; --ink3:#A8A09A;
  --gold:#B07B20; --gold-l:rgba(176,123,32,0.12);
  --red:#C03030; --red-l:rgba(192,48,48,0.10);
  --orange:#C06020; --orange-l:rgba(192,96,32,0.10);
  --green:#2A6A30; --green-l:rgba(42,106,48,0.10);
  --blue:#1A4A8A; --blue-l:rgba(26,74,138,0.10);
  --divider:#E4DED4; --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans HK',sans-serif;background:var(--bg);color:var(--ink);max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden}

/* Header */
.app-header{background:var(--header);padding:16px 18px 14px;position:sticky;top:0;z-index:100}
.app-header h1{font-size:22px;font-weight:900;color:#F0EBE0}
.hk{color:var(--gold);font-size:13px;font-weight:400;margin-left:3px}
.sub{font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.hrow{display:flex;align-items:center;justify-content:space-between}
.icon-btn{background:rgba(255,255,255,0.12);border:none;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#F0EBE0;font-size:16px}

/* Stats */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 12px;background:var(--surface);border-bottom:.5px solid var(--divider)}
.sc{text-align:center;padding:8px 4px;border-radius:8px}
.sc-n{font-size:20px;font-weight:800;line-height:1}
.sc-l{font-size:9px;color:var(--ink3);margin-top:2px}
.sc.total{background:var(--blue-l)}.sc.total .sc-n{color:var(--blue)}
.sc.restock{background:var(--orange-l)}.sc.restock .sc-n{color:var(--orange)}
.sc.expired{background:var(--red-l)}.sc.expired .sc-n{color:var(--red)}
.sc.expiring{background:var(--gold-l)}.sc.expiring .sc-n{color:var(--gold)}

/* Search + chips */
.search-wrap{padding:10px 12px 0;position:relative}
.search-wrap input{width:100%;background:var(--surface);border:.5px solid var(--divider);border-radius:10px;padding:9px 12px 9px 34px;font-size:14px;font-family:inherit;color:var(--ink);outline:none}
.search-wrap input::placeholder{color:var(--ink3)}
.s-icon{position:absolute;left:23px;top:50%;transform:translateY(-50%);color:var(--ink3);font-size:14px}
.chips{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;font-size:12px;padding:5px 12px;border-radius:20px;border:.5px solid var(--divider);background:var(--surface);color:var(--ink2);cursor:pointer;font-family:inherit;transition:all .15s}
.chip.on{background:var(--gold);color:white;border-color:var(--gold);font-weight:600}

/* Items */
.item-list{padding:6px 12px 100px;display:flex;flex-direction:column;gap:6px}
.item-card{background:var(--surface);border-radius:var(--r);border:.5px solid var(--divider);padding:12px 14px;cursor:pointer;transition:transform .1s}
.item-card:active{transform:scale(.985)}
.irow{display:flex;align-items:center;gap:10px}
.lbar{width:3px;border-radius:2px;align-self:stretch;flex-shrink:0}
.iemoji{font-size:26px;width:40px;text-align:center;flex-shrink:0}
.iinfo{flex:1;min-width:0}
.iname{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.imeta{font-size:11px;color:var(--ink3);margin-top:2px}
.iright{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.qty-b{font-size:13px;font-weight:700;color:var(--ink2)}
.eb{font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px}
.e-ok{background:var(--green-l);color:var(--green)}
.e-soon{background:var(--gold-l);color:var(--gold)}
.e-urg{background:var(--orange-l);color:var(--orange)}
.e-exp{background:var(--red-l);color:var(--red)}
.e-none{background:var(--surface2);color:var(--ink3)}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--ink3)}
.empty .em{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px;line-height:1.6}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-top:.5px solid var(--divider);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;border:none;background:none;cursor:pointer;color:var(--ink3);font-family:inherit;font-size:10px;gap:3px;transition:color .15s}
.nav-btn .ni{font-size:20px}
.nav-btn.on{color:var(--gold)}

/* FAB */
.fab{position:fixed;bottom:72px;right:calc(50% - 215px + 16px);background:var(--gold);border:none;border-radius:50%;width:52px;height:52px;font-size:26px;color:white;cursor:pointer;box-shadow:0 4px 16px rgba(176,123,32,.4);display:flex;align-items:center;justify-content:center;z-index:99;transition:transform .2s}
.fab:active{transform:scale(.92)}

/* Overlay + modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;flex-direction:column;justify-content:flex-end;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.mhandle{width:36px;height:4px;background:var(--divider);border-radius:2px;margin:12px auto 0}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;border-bottom:.5px solid var(--divider)}
.mtitle{font-size:17px;font-weight:700}
.mclose{background:var(--surface2);border:none;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink2)}
.form{padding:16px 18px;display:flex;flex-direction:column;gap:14px}
.fl label{font-size:12px;font-weight:600;color:var(--ink2);letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:6px}
.fl input,.fl select{width:100%;border:.5px solid var(--divider);border-radius:10px;padding:10px 12px;font-size:15px;font-family:inherit;color:var(--ink);background:var(--bg);outline:none}
.fl input:focus,.fl select:focus{border-color:var(--gold)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-p{background:var(--gold);color:white;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;font-family:inherit;width:100%;cursor:pointer;margin-top:4px}
.btn-d{background:var(--red-l);color:var(--red);border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:600;font-family:inherit;width:100%;cursor:pointer}

/* Qty controls */
.qty-ctrl{display:flex;align-items:center;justify-content:center;gap:20px;padding:16px 18px}
.q-btn{background:var(--surface2);border:none;border-radius:50%;width:40px;height:40px;font-size:22px;cursor:pointer;color:var(--ink2);display:flex;align-items:center;justify-content:center}
.q-btn.plus{background:var(--gold-l);color:var(--gold)}
.q-num{font-size:40px;font-weight:800;min-width:80px;text-align:center}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 18px 14px}
.dc{background:var(--bg);border-radius:10px;padding:10px 12px}
.dl{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.dv{font-size:15px;font-weight:700}
.qa-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 18px 16px}
.qa-btn{background:var(--bg);border:.5px solid var(--divider);border-radius:10px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-family:inherit}
.qa-btn span{font-size:18px}
.qa-btn small{font-size:10px;color:var(--ink2);text-align:center}

/* Shopping */
.sec{padding:14px 12px 0}
.sec-t{font-size:12px;font-weight:700;color:var(--ink2);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.shop-item{background:var(--surface);border-radius:var(--r);border:.5px solid var(--divider);padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:6px}
.cb{width:22px;height:22px;border-radius:50%;border:2px solid var(--divider);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:12px}
.cb.on{background:var(--green);border-color:var(--green);color:white}
.sn{flex:1;font-size:15px;font-weight:500}
.sn.done{text-decoration:line-through;color:var(--ink3)}
.sdel{background:none;border:none;color:var(--ink3);font-size:16px;cursor:pointer;padding:4px}

/* Tips */
.tip-card{background:var(--surface);border-radius:var(--r);border:.5px solid var(--divider);padding:14px;margin-bottom:8px}
.tf{font-size:15px;font-weight:700;margin-bottom:6px}
.ts{font-size:13px;color:var(--ink2);line-height:1.5}

/* Typhoon */
.ty-head{background:var(--header);margin:12px;border-radius:var(--r);padding:16px}
.ty-head h2{color:#F0EBE0;font-size:18px;font-weight:800}
.ty-head p{color:rgba(240,235,224,.7);font-size:12px;margin-top:4px}
.prog{height:6px;background:var(--divider);border-radius:3px;margin:12px}
.prog-f{height:100%;background:var(--green);border-radius:3px;transition:width .3s}
.ty-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border-radius:10px;margin-bottom:5px;border:.5px solid var(--divider);cursor:pointer}
.ty-ck{width:22px;height:22px;border-radius:50%;border:2px solid var(--divider);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px}
.ty-ck.on{background:var(--green);border-color:var(--green);color:white}
.ty-t{flex:1;font-size:14px}
.ty-t.done{text-decoration:line-through;color:var(--ink3)}

/* Misc */
.disc{font-size:10px;color:var(--ink3);text-align:center;padding:8px 16px 16px;line-height:1.4}
.tab{display:none}.tab.on{display:block}
.hidden{display:none!important}
.info-box{padding:10px 12px;background:var(--gold-l);border-radius:10px;font-size:12px;color:var(--ink2);line-height:1.5}
</style>
</head>
<body>

<div class="app-header">
  <div class="hrow">
    <div>
      <h1>FamilyMark<span class="hk">hk</span></h1>
      <div class="sub" id="subLine">FAMILYMARK.HK</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="icon-btn" onclick="openModal('settingsModal')">⚙️</button>
    </div>
  </div>
</div>

<!-- INVENTORY -->
<div id="tab-inventory" class="tab on">
  <div class="stats-bar" id="statsBar"></div>
  <div class="search-wrap">
    <span class="s-icon">🔍</span>
    <input type="text" placeholder="搜尋存貨..." id="searchInput" oninput="renderAll()">
  </div>
  <div class="chips" id="chips"></div>
  <div class="item-list" id="itemList"></div>
</div>

<!-- SHOPPING -->
<div id="tab-shopping" class="tab">
  <div class="sec" style="padding-bottom:100px">
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input type="text" id="shopInput" placeholder="新增購物項目..." style="flex:1;border:.5px solid var(--divider);border-radius:10px;padding:10px 12px;font-size:15px;font-family:inherit;background:var(--surface);outline:none" onkeydown="if(event.key==='Enter')addShop()">
      <button onclick="addShop()" style="background:var(--gold);color:white;border:none;border-radius:10px;padding:10px 18px;font-size:18px;cursor:pointer">+</button>
    </div>
    <div id="shopList"></div>
    <button onclick="clearDone()" style="width:100%;background:var(--surface2);border:none;border-radius:10px;padding:10px;font-size:13px;color:var(--ink3);cursor:pointer;font-family:inherit;margin-top:6px">清除已購買項目</button>
  </div>
</div>

<!-- TIPS -->
<div id="tab-tips" class="tab">
  <div class="sec" style="padding-bottom:100px">
    <input type="text" id="tipsQ" placeholder="搜尋食物..." oninput="renderTips()" style="width:100%;border:.5px solid var(--divider);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;background:var(--surface);outline:none;margin-bottom:12px">
    <div id="tipsList"></div>
    <div class="disc">僅供參考，實際保存期視乎儲存條件而定。</div>
  </div>
</div>

<!-- TYPHOON -->
<div id="tab-typhoon" class="tab">
  <div class="ty-head"><h2>🌀 颱風備災清單</h2><p>提早準備，保障家人安全</p></div>
  <div class="prog"><div class="prog-f" id="tyProg"></div></div>
  <div class="sec" style="padding-bottom:100px">
    <div id="tyList"></div>
    <div class="disc">⚠️ 僅供參考，請依從香港政府及官方機構指示。資料參考民眾安全服務隊及紅十字會建議。</div>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="nav-btn on" onclick="go('inventory',this)"><span class="ni">📦</span>存貨</button>
  <button class="nav-btn" onclick="go('shopping',this)"><span class="ni">🛒</span>購物</button>
  <button class="nav-btn" onclick="go('tips',this)"><span class="ni">💡</span>保存期</button>
  <button class="nav-btn" onclick="go('typhoon',this)"><span class="ni">🌀</span>備災</button>
</div>

<button class="fab" id="fab" onclick="openAdd()">+</button>

<!-- Add/Edit Item Modal -->
<div class="ov hidden" id="itemModal">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mhead">
      <span class="mtitle" id="mTitle">新增存貨</span>
      <button class="mclose" onclick="closeModal('itemModal')">✕</button>
    </div>
    <div class="form">
      <div class="fl"><label>名稱</label><input type="text" id="fName" placeholder="例：鮮牛奶"></div>
      <div class="frow">
        <div class="fl"><label>分類</label>
          <select id="fCat">
            <option>糧食</option><option>飲料</option><option>日常用品</option>
            <option>清潔</option><option>急凍食品</option><option>醬料</option><option>其他</option>
          </select>
        </div>
        <div class="fl"><label>位置</label><input type="text" id="fLoc" placeholder="例：雪櫃"></div>
      </div>
      <div class="frow">
        <div class="fl"><label>數量</label><input type="number" id="fQty" value="1" min="0"></div>
        <div class="fl"><label>單位</label><input type="text" id="fUnit" placeholder="件/盒/包"></div>
      </div>
      <div class="fl"><label>到期日</label><input type="date" id="fExp"></div>
      <div class="fl"><label>最低存量</label><input type="number" id="fMin" value="1" min="0"></div>
      <button class="btn-p" onclick="saveItem()">儲存</button>
      <button class="btn-d hidden" id="delBtn" onclick="delItem()">刪除存貨</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="ov hidden" id="detailModal">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mhead">
      <span class="mtitle" id="dTitle">—</span>
      <button class="mclose" onclick="closeModal('detailModal')">✕</button>
    </div>
    <div id="dBody"></div>
  </div>
</div>

<!-- Settings Modal -->
<div class="ov hidden" id="settingsModal">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mhead"><span class="mtitle">設定</span><button class="mclose" onclick="closeModal('settingsModal')">✕</button></div>
    <div class="form">
      <div class="fl">
        <label>家庭名稱</label>
        <input type="text" id="fFamily" placeholder="例：Wong's Family" onchange="saveFamily()">
      </div>
      <div class="info-box">💡 名稱會顯示於標題列，方便識別係邊個家庭嘅存貨。</div>
      <div style="border-top:.5px solid var(--divider);padding-top:12px;font-size:13px;color:var(--ink2);line-height:1.8">
        FamilyMark.hk v1.0 Web Beta<br>
        香港家庭存貨管理<br>
        <span style="color:var(--gold)">@familymark.hk</span><br><br>
        <span style="font-size:11px;color:var(--ink3)">資料儲存於本機裝置 (localStorage)<br>清除瀏覽器資料會刪除所有記錄</span>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ──
let items=[], shops=[], tyChecked=new Set(), activeF='全部', editId=null;

const CATS=['全部','糧食','飲料','日常用品','清潔','急凍食品','醬料','其他'];
const EMO={糧食:'🍚',飲料:'🥛',日常用品:'🧴',清潔:'🧹',急凍食品:'❄️',醬料:'🥢',其他:'📦'};

// ── Persist ──
function save(){localStorage.setItem('fm_items',JSON.stringify(items))}
function saveShops(){localStorage.setItem('fm_shops',JSON.stringify(shops))}
function saveTy(){localStorage.setItem('fm_ty',JSON.stringify([...tyChecked]))}
function saveFamily(){
  const v=document.getElementById('fFamily').value.trim();
  localStorage.setItem('fm_family',v);
  document.getElementById('subLine').textContent=v?`FAMILYMARK.HK · ${v.toUpperCase()}`:'FAMILYMARK.HK';
}

function loadAll(){
  items=JSON.parse(localStorage.getItem('fm_items')||'[]');
  shops=JSON.parse(localStorage.getItem('fm_shops')||'[]');
  tyChecked=new Set(JSON.parse(localStorage.getItem('fm_ty')||'[]'));
  const fam=localStorage.getItem('fm_family')||'';
  if(fam){document.getElementById('fFamily').value=fam;document.getElementById('subLine').textContent=`FAMILYMARK.HK · ${fam.toUpperCase()}`;}
}

// ── Expiry ──
function expiryInfo(d){
  if(!d)return{label:'冇到期日',cls:'e-none',days:null};
  const today=new Date();today.setHours(0,0,0,0);
  const exp=new Date(d);exp.setHours(0,0,0,0);
  const diff=Math.round((exp-today)/864e5);
  if(diff<0)return{label:'已過期',cls:'e-exp',days:diff};
  if(diff===0)return{label:'今日到期',cls:'e-urg',days:0};
  if(diff<=3)return{label:`${diff}日後到期`,cls:'e-urg',days:diff};
  if(diff<=7)return{label:`${diff}日後`,cls:'e-soon',days:diff};
  return{label:`${diff}日後`,cls:'e-ok',days:diff};
}
function barClr(item){
  const{days}=expiryInfo(item.exp);
  if(days===null)return'var(--divider)';
  if(days<0)return'var(--red)';
  if(days<=3)return'var(--orange)';
  if(days<=7)return'var(--gold)';
  return'var(--green)';
}

// ── Stats ──
function renderStats(){
  const today=new Date();today.setHours(0,0,0,0);
  const tot=items.length;
  const rst=items.filter(i=>i.qty<=(i.min||1)).length;
  const exp=items.filter(i=>{if(!i.exp)return false;const d=new Date(i.exp);d.setHours(0,0,0,0);return d<today;}).length;
  const soon=items.filter(i=>{if(!i.exp)return false;const d=new Date(i.exp);d.setHours(0,0,0,0);const df=Math.round((d-today)/864e5);return df>=0&&df<=7;}).length;
  document.getElementById('statsBar').innerHTML=`
    <div class="sc total"><div class="sc-n">${tot}</div><div class="sc-l">總存貨</div></div>
    <div class="sc restock"><div class="sc-n">${rst}</div><div class="sc-l">需補貨</div></div>
    <div class="sc expired"><div class="sc-n">${exp}</div><div class="sc-l">已過期</div></div>
    <div class="sc expiring"><div class="sc-n">${soon}</div><div class="sc-l">快到期</div></div>`;
}

// ── Chips ──
function renderChips(){
  document.getElementById('chips').innerHTML=CATS.map(c=>`<button class="chip${c===activeF?' on':''}" onclick="setF('${c}')">${c}</button>`).join('');
}
function setF(f){activeF=f;renderChips();renderList();}

// ── List ──
function renderList(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  let list=items.filter(i=>{
    const mc=activeF==='全部'||i.cat===activeF;
    const mq=!q||i.name.toLowerCase().includes(q)||(i.loc||'').toLowerCase().includes(q);
    return mc&&mq;
  }).sort((a,b)=>{
    if(a.exp&&b.exp)return new Date(a.exp)-new Date(b.exp);
    if(a.exp)return-1;if(b.exp)return 1;return 0;
  });
  const el=document.getElementById('itemList');
  if(!list.length){el.innerHTML='<div class="empty"><div class="em">📦</div><p>未有存貨<br><small>點擊 + 新增第一件存貨</small></p></div>';return;}
  el.innerHTML=list.map(item=>{
    const ei=expiryInfo(item.exp);
    return`<div class="item-card" onclick="openDetail('${item.id}')">
      <div class="irow">
        <div class="lbar" style="background:${barClr(item)}"></div>
        <div class="iemoji">${EMO[item.cat]||'📦'}</div>
        <div class="iinfo"><div class="iname">${item.name}</div><div class="imeta">${item.cat}${item.loc?' · '+item.loc:''}</div></div>
        <div class="iright"><div class="qty-b">${item.qty} ${item.unit||'件'}</div><div class="eb ${ei.cls}">${ei.label}</div></div>
      </div></div>`;
  }).join('');
}

function renderAll(){renderStats();renderList();}

// ── Add/Edit ──
function openAdd(){
  editId=null;
  document.getElementById('mTitle').textContent='新增存貨';
  ['fName','fLoc','fUnit','fExp'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fCat').value='糧食';
  document.getElementById('fQty').value='1';
  document.getElementById('fMin').value='1';
  document.getElementById('delBtn').classList.add('hidden');
  openModal('itemModal');
}

function openEdit(id){
  const item=items.find(i=>i.id===id);if(!item)return;
  editId=id;
  document.getElementById('mTitle').textContent='編輯存貨';
  document.getElementById('fName').value=item.name;
  document.getElementById('fCat').value=item.cat;
  document.getElementById('fLoc').value=item.loc||'';
  document.getElementById('fQty').value=item.qty;
  document.getElementById('fUnit').value=item.unit||'';
  document.getElementById('fExp').value=item.exp||'';
  document.getElementById('fMin').value=item.min||1;
  document.getElementById('delBtn').classList.remove('hidden');
  closeModal('detailModal');
  openModal('itemModal');
}

function saveItem(){
  const name=document.getElementById('fName').value.trim();
  if(!name){alert('請輸入名稱');return;}
  const item={
    id:editId||Date.now().toString(36)+Math.random().toString(36).slice(2),
    name,cat:document.getElementById('fCat').value,
    loc:document.getElementById('fLoc').value.trim(),
    qty:parseInt(document.getElementById('fQty').value)||0,
    unit:document.getElementById('fUnit').value.trim()||'件',
    exp:document.getElementById('fExp').value||null,
    min:parseInt(document.getElementById('fMin').value)||1,
  };
  if(editId)items=items.map(i=>i.id===editId?item:i);
  else items.push(item);
  save();closeModal('itemModal');renderAll();
}

function delItem(){
  if(!editId||!confirm('確定刪除？'))return;
  items=items.filter(i=>i.id!==editId);
  save();closeModal('itemModal');renderAll();
}

// ── Detail ──
function openDetail(id){
  const item=items.find(i=>i.id===id);if(!item)return;
  const ei=expiryInfo(item.exp);
  document.getElementById('dTitle').textContent=(EMO[item.cat]||'📦')+' '+item.name;
  document.getElementById('dBody').innerHTML=`
    <div class="qty-ctrl">
      <button class="q-btn" onclick="adj('${id}',-1)">−</button>
      <div class="q-num" id="qn-${id}">${item.qty}</div>
      <button class="q-btn plus" onclick="adj('${id}',1)">+</button>
    </div>
    <div style="text-align:center;color:var(--ink3);font-size:12px;margin:-8px 0 12px">${item.unit||'件'}</div>
    <div class="detail-grid">
      <div class="dc"><div class="dl">分類</div><div class="dv">${item.cat}</div></div>
      <div class="dc"><div class="dl">位置</div><div class="dv">${item.loc||'—'}</div></div>
      <div class="dc"><div class="dl">到期日</div><div class="dv" style="font-size:13px">${item.exp||'—'}</div></div>
      <div class="dc"><div class="dl">狀態</div><div class="dv"><span class="eb ${ei.cls}">${ei.label}</span></div></div>
    </div>
    <div class="qa-grid">
      <button class="qa-btn" onclick="toShop('${item.name}')"><span>🛒</span><small>加購物車</small></button>
      <button class="qa-btn" onclick="openEdit('${id}')"><span>✏️</span><small>編輯</small></button>
      <button class="qa-btn" onclick="delDirect('${id}')"><span>🗑️</span><small>刪除</small></button>
    </div>`;
  openModal('detailModal');
}

function adj(id,d){
  const item=items.find(i=>i.id===id);if(!item)return;
  item.qty=Math.max(0,item.qty+d);
  const el=document.getElementById('qn-'+id);if(el)el.textContent=item.qty;
  save();renderAll();
}

function delDirect(id){
  if(!confirm('確定刪除？'))return;
  items=items.filter(i=>i.id!==id);save();closeModal('detailModal');renderAll();
}

function toShop(name){shops.push({name,done:false});saveShops();renderShops();closeModal('detailModal');}

// ── Shopping ──
function renderShops(){
  document.getElementById('shopList').innerHTML=shops.map((s,i)=>`
    <div class="shop-item">
      <div class="cb ${s.done?'on':''}" onclick="togShop(${i})">${s.done?'✓':''}</div>
      <div class="sn ${s.done?'done':''}">${s.name}</div>
      <button class="sdel" onclick="rmShop(${i})">✕</button>
    </div>`).join('');
}
function addShop(){
  const inp=document.getElementById('shopInput'),n=inp.value.trim();
  if(!n)return;shops.push({name:n,done:false});inp.value='';saveShops();renderShops();
}
function togShop(i){shops[i].done=!shops[i].done;saveShops();renderShops();}
function rmShop(i){shops.splice(i,1);saveShops();renderShops();}
function clearDone(){shops=shops.filter(s=>!s.done);saveShops();renderShops();}

function togTy(id){

}

// ── Nav ──
function go(tab,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+tab).classList.add('on');
  btn.classList.add('on');
  document.getElementById('fab').style.display=tab==='inventory'?'flex':'none';
}

function openModal(id){document.getElementById(id).classList.remove('hidden');}
function closeModal(id){document.getElementById(id).classList.add('hidden');}

document.querySelectorAll('.ov').forEach(ov=>{
  ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.add('hidden');});
});
